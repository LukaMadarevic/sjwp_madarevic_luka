<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
<style>
.container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  
}
.card {
  background: lightblue;
  padding: 40px;
  text-align: center;
  border-radius: 10px;
}
@media (max-width: 1023px) {
  .container {
    grid-template-columns: repeat(2, 1fr);
  }
}
@media (max-width: 767px ) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="card">Proizvod 1</div>
  <div class="card">Proizvod 2</div>
  <div class="card">Proizvod 3</div>
  <div class="card">Proizvod 4</div>
  <div class="card">Proizvod 5</div>
  <div class="card">Proizvod 6</div>
  <div class="card">Proizvod 7</div>
  <div class="card">Proizvod 8</div>
</div>
</body>
</html>
