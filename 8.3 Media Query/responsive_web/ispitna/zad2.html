<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
<style>
body {
margin:0;
font-family:Arial,sans-serif;
}
.layout{
    display:grid;
    grid-template-areas:
    "header"
    "sidebar"
    "main"
    "footer";
    grid-template-columns: 1fr;
}
.header{
    grid-area :header;
    background:purple;
    color:white;
    padding:20px;
    text-align:center;
}
.sidebar{
    grid-area:main;
    background:lightyellow;
    padding:20px;
}
.footer{
    grid-area:footer;
    background:lightblue;
    padding:20px;
    text-align:center;
}
@media(min-width 768px){
    .layout{
        grid-template-areas: 
        "header header"
        "sidebar main"
        "footer footer";
        grid-template-columns: 200px 1fr;
    }
}
</style>
</head>
<body>
<div class="layout">
  <div class="header">HEADER</div>
  <div class="sidebar">SIDEBAR</div>
  <div class="main">MAIN CONTENT</div>
  <div class="footer">FOOTER</div>
</div>
</body>
</html>
