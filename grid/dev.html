<!DOCTYPE html>
<html>
<head>
<style>

.container{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    width:400px;
}

.box{
    padding:20px;
    color:white;
    background:#444;
}

.a{ grid-column:1/3; }
.b{ grid-column:3/5; }

.c{ grid-column:1/2; }
.d{ grid-column:2/3; }

.f{
    grid-column:3/5;
    background:#4a6fa5;
}

.e{
    grid-column:1/5;
}

</style>
</head>

<body>

<div class="container">

<div class="box a">A</div>
<div class="box b">B</div>

<div class="box c">C</div>
<div class="box d">D</div>
<div class="box f">F</div>

<div class="box e">E</div>

</div>

</body>
</html>
