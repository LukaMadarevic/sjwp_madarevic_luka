<!DOCTYPE html>
<html>
<head>
<style>
.container{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px;
}

.box{
    background: #4a4a4a;
    color: white;
    padding: 20px;
    font-size: 20px;
    border-radius: 5px;
}

/* raspored */
.a{ grid-column: span 2; }
.b{ grid-column: span 2; }
.c{ grid-column: span 1; }
.d{ grid-column: span 3; }
.e{ grid-column: span 4; }

</style>
</head>

<body>

<div class="container">
    <div class="box a">A</div>
    <div class="box b">B</div>
    <div class="box c">C</div>
    <div class="box d">D</div>
    <div class="box e">E</div>
</div>

</body>
</html>
