!DOCTYPE html>
<html>
<head>
<style>

.container{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:10px;
}

.box{
    background:#444;
    color:white;
    font-size:30px;
    text-align:center;
    padding:40px;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="container">
    <div class="box">D</div>
    <div class="box">A</div>
    <div class="box">F</div>
    <div class="box">E</div>
    <div class="box">B</div>
    <div class="box">C</div>
</div>

</body>
</html>
