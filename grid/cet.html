<!DOCTYPE html>
<html>
<head>
<style>

.container{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(2,120px);
    gap:10px;
}

.box{
    background:#444;
    color:white;
    font-size:30px;
    text-align:center;
    padding:20px;
}

.a{
    grid-column:1/3;
}

.b{
    grid-row:1/3;
    grid-column:3;
}

</style>
</head>

<body>

<div class="container">
    <div class="box a">A</div>
    <div class="box b">B</div>
    <div class="box">C</div>
    <div class="box">D</div>
</div>

</body>
</html>
