<!DOCTYPE html>
<html>
<head>
<style>

.container{
    display:grid;
    grid-template-columns: repeat(6, 60px);
    gap:10px;
    width:420px;
}

.box{
    padding:20px;
    text-align:center;
    background:#444;
    color:white;
}

.light{
    background:#ccc;
    color:black;
}

</style>
</head>

<body>

<div class="container">

<div class="box">1</div>
<div class="box light">2</div>
<div class="box">3</div>
<div class="box light">4</div>
<div class="box">5</div>
<div class="box light">6</div>

<div class="box">7</div>
<div class="box light">8</div>
<div class="box">9</div>
<div class="box light">10</div>
<div class="box">11</div>
<div class="box light">12</div>

</div>

</body>
</html>
