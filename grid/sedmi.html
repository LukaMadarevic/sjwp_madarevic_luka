<!DOCTYPE html>
<html>
<head>
<style>

.container{
    display:grid;
    grid-template-columns: 1fr 3fr;
    gap:10px;
    width:400px;
}

.header{
    grid-column:1/3;
    background:gray;
    padding:10px;
}

.sidebar{
    background:#444;
    color:white;
    padding:10px;
}

.content{
    background:#444;
    color:white;
    padding:10px;
}

.sidebar2{
    grid-column:1/3;
    background:#bbb;
    padding:10px;
}

.footer{
    grid-column:1/3;
    background:gray;
    padding:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">Header</div>

<div class="sidebar">Sidebar</div>

<div class="content">
Content<br>
More content than we had before so this column is now quite tall.
</div>

<div class="sidebar2">Sidebar 2</div>

<div class="footer">Footer</div>

</div>

</body>
</html>
