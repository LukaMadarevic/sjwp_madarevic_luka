<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .pravokutnik {
            width: 100px;
            height: 100px;
            background-color: dodgerblue;
            animation: pomicanje 1.8s infinite alternate ease-in-out;
        }

        @keyframes pomicanje {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(50px);
            }
        }
    </style>
</head>
<body>

    <div class="pravokutnik"></div>

</body>
</html>
