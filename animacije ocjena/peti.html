<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>NDocument</title>
<style>
  body {
    margin: 0;
    height: 100px;
    display: flex;
    justify-content: center; 
    align-items: center;     
  }

  .tekst {
    font-size: 2rem;
    animation: nestanak 3s infinite alternate ease-in-out;
  }
  @keyframes nestanak {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }
</style>
</head>
<body>

<div class="tekst">Ovo je animirani tekst</div>

</body>
</html>
