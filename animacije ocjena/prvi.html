<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.krug {
    width: 80px;   
    height: 80px;
    background-color: dodgerblue;
    border-radius: 50%;
    transform: scale(1.3);
    animation: scale 2s infinite alternate ease;
}

@keyframes scale {
    0% {
        transform: scale(1);
    }
    100% {
        transform: scale(1.3);
    }
}
    </style>
</head>
<body>
    <div class="krug"></div>
</body>
</html>
