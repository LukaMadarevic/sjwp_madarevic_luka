<style>
div {
    width: 100px;
    height: 100px;
    border:4px solid #fcd779;
    border-top: 4px solid transparent;
    animation: rotate 2s infinite linear;
    border-radius : 50%;
}

@keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
